<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ChatGPT UI Trimmer</title>

  <style>
    body {
      font-family: "JetBrains Mono", monospace;
      padding: 16px;
      width: 240px;
      background: #111111;
      color: #e5e7eb;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    h3 {
      margin: 0;
      font-size: 14px;
      color: #9ca3af;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .value {
      font-size: 32px;
      font-weight: bold;
      text-align: center;
      color: #6ee7b7; /* mint accent */
    }

    input[type="range"] {
      width: 100%;
      accent-color: #6ee7b7; /* mint slider */
      cursor: pointer;
    }

    button {
      padding: 8px;
      border: none;
      border-radius: 6px;
      background-color: #6ee7b7;
      color: #111;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.1s ease, opacity 0.1s ease;
    }

    button:hover {
      transform: scale(1.03);
      opacity: 0.9;
    }

    #status {
      font-size: 12px;
      text-align: center;
      color: #6ee7b7;
    }
  </style>
</head>

<body>

  <div class="container">
    <h3>Messages to Keep</h3>

    <div id="value" class="value">10</div>

    <input
      id="slider"
      type="range"
      min="5"
      max="50"
      value="10"
    >

    <button id="save">Save</button>

    <div id="status"></div>
  </div>

  <script src="popup.js"></script>

</body>
</html>
